paths:
  survey_id: demo_survey
  out_dir: ./_fbpick_out
  segy_files:
    - /path/to/infer_survey.sgy

thresholds:
  confidence_min: 0.0
  trace_valid_min_fraction: 0.0
  qc_reject_confidence_below: 0.0

dataset:
  use_header_cache: true
  waveform_mode: eager
  infer_endian: big

infer:
  ckpt_path: ./_fbpick_out/ckpt/best.pt
  device: auto
  allow_unsafe_override: false

tile:
  tile_w: 6016
  overlap_w: 1024
  tiles_per_batch: 16
  amp: true
  use_tqdm: false
