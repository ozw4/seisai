paths:
  segy_files:
    - REPLACE_ME_infer_coarse.sgy
  out_dir: ./_fbpick_coarse_infer_out

coarse:
  input_mode: global_anchor_resize

dataset:
  use_header_cache: true
  verbose: true
  progress: true
  # Raw global-anchor coarse inference currently supports exactly one key.
  primary_keys: [ffid]
  waveform_mode: eager
  train_endian: big
  infer_endian: big
  coord_unit_scale_to_m: 1.0

transform:
  trace_len: 256
  time_len: 2048
  standardize_eps: 1.0e-8

trace_anchor:
  gap_ratio: 5.0
  min_gap_m: null
  # Required by the shared coarse schema; raw inference uses infer_mode only.
  train_mode: random
  infer_mode: center

norm_refs:
  time_ref_sec: 20.0
  offset_ref_m: 2000.0

infer:
  ckpt_path: REPLACE_ME_coarse_best.pt
  device: auto
  batch_size: 1
  num_workers: 0
  amp: false
  use_tqdm: false

qc:
  enabled: false
  max_gathers: 16
  out_subdir: vis/coarse_global_anchor
  plot_anchor_grid: true
  plot_original_gather: true
  plot_confidence: true
  plot_error_if_labels_available: true
  fine_window_half_samples: 128
  max_display_traces: 512
  max_display_samples: 4096
  low_confidence_threshold: null

model:
  backbone: resnet18
  pretrained: false
  in_chans: 3
  out_chans: 1
