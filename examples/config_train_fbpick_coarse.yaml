paths:
  segy_files:
    - REPLACE_ME_train_coarse.sgy
  fb_files:
    - REPLACE_ME_train_coarse_fb.npy
  infer_segy_files:
    - REPLACE_ME_valid_coarse.sgy
  infer_fb_files:
    - REPLACE_ME_valid_coarse_fb.npy
  out_dir: ./_fbpick_coarse_train_out

coarse:
  input_mode: global_anchor_resize

dataset:
  use_header_cache: true
  verbose: true
  progress: true
  primary_keys: [ffid]
  waveform_mode: eager
  train_endian: big
  infer_endian: big

transform:
  trace_len: 256
  time_len: 2048
  standardize_eps: 1.0e-8

trace_anchor:
  gap_ratio: 5.0
  min_gap_m: null
  train_mode: random
  infer_mode: center

norm_refs:
  time_ref_sec: 20.0
  offset_ref_m: 2000.0

train:
  seed: 0
  epochs: 10
  samples_per_epoch: 128
  batch_size: 4
  num_workers: 0
  max_norm: 1.0
  use_amp: false
  lr: 1.0e-3
  weight_decay: 0.0
  fb_sigma_ms: 10.0

infer:
  seed: 0
  batch_size: 1
  num_workers: 0
  max_batches: 8

vis:
  n: 0
  out_subdir: vis

ckpt:
  save_best_only: true
  metric: infer_loss
  mode: min

model:
  backbone: resnet18
  pretrained: false
  in_chans: 3
  out_chans: 1
