paths:
  segy_files:
    - ../test_data/ridgecrest_das/20200623002546.sgy
  robust_npz_files:
    - ./_fbpick_physics_out/20200623002546.robust.npz
  out_dir: ./_fbpick_fine_infer_out

infer:
  ckpt_path: ./_fbpick_fine_train_out/ckpt/best.pt
  device: auto
  batch_size: 1
  num_workers: 0
  overlap_h: 96
  amp: false
  use_tqdm: false
  high_conf_threshold: 0.5
  source_model_id: null
  iter_id: null
  allow_unsafe_override: false

# dataset / transform / model are merged from the fine training checkpoint cfg.
# Run:
# python cli/run_fbpick_fine_infer.py --config examples/config_infer_fbpick_fine.yaml
# Unknown override examples:
# python cli/run_fbpick_fine_infer.py --config examples/config_infer_fbpick_fine.yaml infer.high_conf_threshold=0.7
# python cli/run_fbpick_fine_infer.py --config examples/config_infer_fbpick_fine.yaml paths.out_dir=./_fbpick_fine_infer_debug
