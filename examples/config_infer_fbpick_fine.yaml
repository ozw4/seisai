# Role: fine inference configuration skeleton for Phase 5 foundations.
# Fine v1 consumes coarse seeds but keeps the model input amplitude-only.
paths:
  survey_id: demo_survey
  out_dir: ./_fbpick_out
  segy_files:
    - /path/to/infer_survey.sgy

thresholds:
  confidence_min: 0.0
  trace_valid_min_fraction: 0.0
  qc_reject_confidence_below: 0.0

infer:
  ckpt_path: ./_fbpick_out/ckpt/best.pt
  device: auto
  allow_unsafe_override: false

input:
  amplitude_key: x_local_amp
  input_key: input
  use_offset_channel: false
  use_relative_time_channel: false

target:
  sigma: 1.5

window:
  local_window_len: 512

model:
  backbone: resnet18
  in_chans: 1
  out_chans: 1
