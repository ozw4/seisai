# Role: fine inference configuration skeleton for Phase 6.
# Fine infer uses amplitude-only 1ch input.
# Raw pick restoration uses raw_sample_idx_local.
# Pad detection uses raw_sample_idx_local == -1.
paths:
  survey_id: demo_survey
  out_dir: ./_fbpick_out
  segy_files:
    - /path/to/infer_survey.sgy

thresholds:
  confidence_min: 0.0
  trace_valid_min_fraction: 0.0
  qc_reject_confidence_below: 0.0

infer:
  ckpt_path: ./_fbpick_out/ckpt/best.pt
  device: auto
  allow_unsafe_override: false

input:
  amplitude_key: x_local_amp
  input_key: input
  use_offset_channel: false
  use_relative_time_channel: false

target:
  sigma: 1.5

window:
  local_window_len: 512

model:
  backbone: resnet18
  in_chans: 1
  out_chans: 1
