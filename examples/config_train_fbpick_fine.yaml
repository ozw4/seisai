paths:
  segy_files:
    - REPLACE_ME_train_fine.sgy
  fb_files:
    - REPLACE_ME_train_fine_fb.npy
  robust_npz_files:
    - REPLACE_ME_train_fine.robust.npz
  out_dir: ./_fbpick_fine_train_out

dataset:
  use_header_cache: true
  verbose: true
  progress: true
  primary_keys: [ffid]
  waveform_mode: eager
  train_endian: big
  infer_endian: big

transform:
  trace_len: 128
  time_len: 256
  center_index: 128
  standardize_eps: 1.0e-8

train:
  seed: 0
  epochs: 10
  samples_per_epoch: 128
  batch_size: 4
  num_workers: 0
  max_norm: 1.0
  use_amp: false
  lr: 1.0e-3
  weight_decay: 0.0
  fb_sigma_ms: 3.0
  sigma_samples_min: 1.5
  sigma_samples_max: 12.0

infer:
  seed: 0
  batch_size: 1
  num_workers: 0
  max_batches: 8

vis:
  n: 0
  out_subdir: vis

ckpt:
  save_best_only: true
  metric: infer_loss
  mode: min

model:
  backbone: resnet18
  pretrained: false
  in_chans: 1
  out_chans: 1

init:
  coarse_ckpt_path: REPLACE_ME_coarse_init.pt
  use_coarse_init: true
  reset_seg_head: true
  reset_first_bn_stats: true
