paths:
  segy_files: /workspace/proc/tools/configs/sgy_list_train_site54.txt
  out_dir: ../fbpick_coarse_infer_out

dataset:
  use_header_cache: true
  verbose: true
  progress: true
  primary_keys: [ffid]
  waveform_mode: eager
  train_endian: big
  infer_endian: big

coarse:
  input_mode: global_anchor_resize

transform:
  trace_len: 256
  time_len: 2048
  standardize_eps: 1.0e-8

trace_anchor:
  gap_ratio: 5.0
  min_gap_m: null
  train_mode: random
  infer_mode: center

norm_refs:
  time_ref_sec: 20.0
  offset_ref_m: 2000.0

infer:
  ckpt_path: /workspace/proc/fbpick/site54/fbpick_coarse_train_out/ckpt/best.pt
  device: cuda:1
  batch_size: 1
  num_workers: 0
  amp: false
  use_tqdm: false

model:
  backbone: resnet18
  pretrained: false
  in_chans: 3
  out_chans: 1
  pre_stages: 3
  pre_stage_strides:
    - [1, 2]
    - [1, 1]
    - [1, 2]
  pre_stage_channels: [16, 32, 32]
  pre_stage_kernels: [3, 3]
