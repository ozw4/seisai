paths:
  segy_files: /workspace/proc/fbpick/site54/oof/lists/fine/baseline_physical_center/fold01/heldout_sgy.txt
  robust_npz_files: /workspace/proc/fbpick/site54/oof/lists/fine/baseline_physical_center/fold01/heldout_robust.txt
  coarse_npz_files: /workspace/proc/fbpick/site54/oof/lists/fine/baseline_physical_center/fold01/heldout_coarse.txt
  out_dir: /workspace/proc/fbpick/site54/oof/runs/baseline_physical_center/fold01/07_fine_infer
dataset:
  use_header_cache: true
  verbose: true
  progress: true
  primary_keys:
  - ffid
  waveform_mode: eager
  train_endian: big
  infer_endian: big
transform:
  trace_len: 128
  time_len: 256
  center_index: 128
  standardize_eps: 1.0e-08
window_center:
  npz_key: physical_center_i
  fallback_npz_key: null
infer:
  ckpt_path: /workspace/proc/fbpick/site54/oof/runs/baseline_physical_center/fold01/06_fine_train/ckpt/best.pt
  device: auto
  batch_size: 1
  num_workers: 0
  overlap_h: 96
  amp: false
  use_tqdm: false
  high_conf_threshold: 0.5
  source_model_id: null
  iter_id: null
  allow_unsafe_override: false
viewer:
  enabled: true
  save_overview_png: false
  save_gather_png: true
  max_gathers_per_file: 8
  skip_gather_keys:
    ffid:
    - 0
  max_traces_per_gather: 10000
  waveform_norm: per_trace
  dpi: 150
  clip_percentile: 99.0
model:
  backbone: resnet18
  pretrained: false
  in_chans: 1
  out_chans: 1
