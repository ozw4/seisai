# A5 plus offset-bin observation downsampling before each RANSAC fit.
paths:
  sgy_file: fdata_hset_ARA26_Vib.sgy
  sgy_dir: /home/dcuser/data/ActiveSeisField/Arakawa2026
  work_dir: ../../runtime_runs/A6_A5_obs_downsample256
  coarse_dir: ../../runtime_runs/A0_full/coarse
  coarse_template: ../coarse_one.yaml
  physics_template: ../physics_one.yaml

run:
  force_coarse: false
  force_physics: true
  force_export: true

physical_runtime:
  diagnostics_enabled: true
  write_runtime_summary: true
  fit_policy: anchor_source_xy
  anchor_selection:
    enabled: true
    mode: source_xy_stride
    anchor_stride_source_groups: 5
    include_first: true
    include_last: true
  anchor_reuse:
    enabled: true
    non_anchor_mode: nearest_anchor_plus_t0_shift
    fallback_if_no_compatible_segment: full_fit
  t0_shift:
    enabled: true
    estimator: median
    min_valid_for_t0_shift: 8
    t0_shift_clip_ms: 60.0
  adaptive_refit:
    enabled: true
    resid_p90_ms_gt: 50.0
    median_abs_shift_ms_gt: 40.0
  observation_sampling:
    enabled: true
    method: offset_bin
    max_obs_per_fit: 256
    n_offset_bins: 64
    bin_pick: pmax_max

visualization:
  enabled: false

export:
  pick_key: physical_center_i
  phase_mode: peak
  max_shift_samples: 2
  grstat_format: recno_channel_range
  values_per_line: 5
