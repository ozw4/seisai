# Full physics baseline. Edit paths.sgy_file / paths.sgy_dir for another line.
paths:
  sgy_file: fdata_hset_ARA26_Vib.sgy
  sgy_dir: /home/dcuser/data/ActiveSeisField/Arakawa2026
  work_dir: ../../runtime_runs/A0_full
  coarse_template: ../coarse_one.yaml
  physics_template: ../physics_one.yaml

run:
  force_coarse: false
  force_physics: true
  force_export: true

physical_runtime:
  diagnostics_enabled: true
  write_runtime_summary: true
  fit_policy: full

visualization:
  enabled: false

export:
  pick_key: physical_center_i
  phase_mode: peak
  max_shift_samples: 2
  grstat_format: recno_channel_range
  values_per_line: 5
