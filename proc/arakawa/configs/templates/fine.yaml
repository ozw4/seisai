# Template for Arakawa fine-stage experiments.
# Do not run or edit as a user config; generated or experiment configs should
# rewrite paths before use.
paths:
  segy_files:
    - "/home/dcuser/data/ActiveSeisField/Arakawa2026/fdata_hset_ARA26_Vib.sgy"
  robust_npz_files:
    - "/workspace/proc/arakawa/outputs/robust/Arakawa2026__fdata_hset_ARA26_Vib.robust.npz"
  coarse_npz_files:
    - "/workspace/proc/arakawa/outputs/coarse/Arakawa2026__fdata_hset_ARA26_Vib.coarse.npz"
  out_dir: "/workspace/proc/arakawa/outputs/fine"

dataset:
  use_header_cache: true
  verbose: true
  progress: true
  primary_keys: [ffid]
  waveform_mode: eager
  train_endian: big
  infer_endian: big

window_center:
  npz_key: fine_center_i
  fallback_npz_key: robust_pick_i

infer:
  ckpt_path: "/workspace/proc/fbpick/site54/fbpick_fine_train_oof_out/ckpt/best.pt"
  device: auto
  batch_size: 1
  num_workers: 0
  overlap_h: 96
  amp: false
  use_tqdm: false
  high_conf_threshold: 0.5
  source_model_id: null
  iter_id: null
  allow_unsafe_override: false

viewer:
  enabled: true
  save_overview_png: false
  save_gather_png: true
  max_gathers_per_file: 8
  skip_gather_keys: {}
  max_traces_per_gather: 10000
  waveform_norm: per_trace
  dpi: 150
  clip_percentile: 99.0
