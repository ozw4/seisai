paths:
  segy_files:
  - /home/dcuser/data/ActiveSeisField/Arakawa2026/fdata_hset_ARA26_Vib.sgy
  out_dir: /workspace/proc/arakawa/outputs/coarse
coarse:
  input_mode: global_anchor_resize
dataset:
  use_header_cache: true
  verbose: true
  progress: true
  primary_keys:
  - ffid
  waveform_mode: eager
  train_endian: big
  infer_endian: big
  coord_unit_scale_to_m: 1.0
transform:
  trace_len: 256
  time_len: 2048
  standardize_eps: 1.0e-08
trace_anchor:
  gap_ratio: 5.0
  min_gap_m: null
  train_mode: random
  infer_mode: center
norm_refs:
  time_ref_sec: 20.0
  offset_ref_m: 2000.0
infer:
  ckpt_path: /workspace/proc/arakawa/weight/coarse.pt
  device: auto
  batch_size: 1
  num_workers: 0
  amp: false
  use_tqdm: false
qc:
  enabled: false
  max_gathers: 16
  out_subdir: vis/coarse_global_anchor
  plot_anchor_grid: true
  plot_original_gather: true
  plot_confidence: true
  plot_error_if_labels_available: true
  fine_window_half_samples: 128
  max_display_traces: 512
  max_display_samples: 4096
  low_confidence_threshold: null
model:
  backbone: resnet18
  in_chans: 3
  out_chans: 1
  pretrained: false
  stage_strides: null
  extra_stages: 0
  extra_stage_strides: null
  extra_stage_channels: null
  extra_stage_use_bn: true
  pre_stages: 3
  pre_stage_strides:
  - - 1
    - 2
  - - 1
    - 1
  - - 1
    - 2
  pre_stage_kernels:
  - 3
  - 3
  pre_stage_channels:
  - 16
  - 32
  - 32
  pre_stage_use_bn: true
  pre_stage_antialias: false
  pre_stage_aa_taps: 3
  pre_stage_aa_pad_mode: zeros
  disable_prestage_skip_indices: []
  disable_backbone_skip_indices: []
  decoder_channels:
  - 256
  - 128
  - 64
  - 32
  decoder_scales:
  - 2
  - 2
  - 2
  - 2
  upsample_mode: bilinear
  attention_type: scse
  intermediate_conv: true
