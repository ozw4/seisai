# Template for Arakawa physics QC generation.
# Do not run or edit as a user config; the export runner creates a generated QC
# config with current paths when visualization.enabled is true.
paths:
  segy_files:
    - "/home/dcuser/data/ActiveSeisField/Arakawa2026/fdata_hset_ARA26_Vib.sgy"
  fb_files:
    - "/workspace/proc/arakawa/outputs/fb_dummy/Arakawa2026__fdata_hset_ARA26_Vib.fb_none.npy"
  coarse_npz_dir: "/workspace/proc/arakawa/outputs/coarse"
  robust_npz_dir: "/workspace/proc/arakawa/outputs/robust"
  final_npz_files:
    - "/workspace/proc/arakawa/outputs/fine/Arakawa2026__fdata_hset_ARA26_Vib.fbpick_final.npz"
  out_dir: "/workspace/proc/arakawa/outputs/qc_no_fb"

dataset:
  primary_keys: [ffid]
  infer_endian: big
  use_header_cache: true

vis:
  waveform_norm: per_trace
  clip_percentile: 99.0
  max_gathers_per_file: 10
  gather_selection: even
  first_panel_only: true
  max_traces_per_gather: 10000
  save_cdf: false
  save_summary_csv: true
  skip_gather_keys: {}

  overlays:
    coarse_pmax: true
    trend_center: true
    physical_center: true

    fine_center: false
    window: false
    final_pick: false

    physical_model_status: true

  first_panel_flatten:
    enabled: true
    reference_key: physical_center_i
    half_samples: 256
