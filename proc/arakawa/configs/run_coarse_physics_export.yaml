# Arakawa one-shot runner full config:
# Coarse -> Physics -> physical_center_i grstat export -> optional QC/evaluation.
#
# Most users should edit run_coarse_physics_export_minimal.yaml instead.
# Use this file when you need to inspect or override output, visualization, or
# evaluation settings.
paths:
  # Bare filenames are resolved against sgy_dir.
  sgy_file: fdata_hset_ARA26_Vib.sgy
  sgy_dir: /home/dcuser/data/ActiveSeisField/Arakawa2026

  # Output root. Stage outputs default to subdirectories under this path:
  # coarse/, robust/, grstat/, eval/, generated_configs/, qc/, fb_dummy/.
  work_dir: /workspace/proc/arakawa/outputs

  # Optional output overrides. Leave unset to use work_dir-derived defaults.
  # coarse_dir: /workspace/proc/arakawa/outputs/coarse
  # robust_dir: /workspace/proc/arakawa/outputs/robust
  # grstat_dir: /workspace/proc/arakawa/outputs/grstat
  # eval_dir: /workspace/proc/arakawa/outputs/eval
  # generated_config_dir: /workspace/proc/arakawa/outputs/generated_configs
  # out_crd: /path/to/output.crd
  # out_npz: /path/to/output.npz

  # Optional. When set, export also evaluates against this grstat first-break file.
  # reference_grstat_path: /path/to/reference_first_break.crd

  # Optional. Used by run.eval_only=true when the export .npz is not at the
  # default grstat output path.
  # export_npz: /path/to/<TAG>.physical_center.snap_peak.ltcor2.npz

  # Optional. Defaults to the canonical Arakawa templates below. These templates
  # are not user-run configs; this runner rewrites paths into generated configs.
  # coarse_template: /workspace/proc/arakawa/configs/templates/coarse.yaml
  # physics_template: /workspace/proc/arakawa/configs/templates/physics.yaml

run:
  # true: skip Coarse/Physics/export and rerun only grstat reference evaluation
  # from an existing export .npz.
  eval_only: false

  # false: reuse existing coarse/robust/export artifacts.
  # true: regenerate existing artifacts.
  force: false
  force_coarse: false
  force_physics: false
  force_export: true

export:
  pick_key: physical_center_i
  phase_mode: peak
  max_shift_samples: 2
  endian: big
  duplicate_policy: error
  grstat_format: recno_channel_range
  values_per_line: 5
  header_comment: Arakawa physical_center_i snap to phase

# Used only when paths.reference_grstat_path is set. Summary files are written
# under paths.eval_dir unless evaluation.summary_json/csv are explicitly set.
evaluation:
  enabled: true
  strict_gather_numbers: true
  strict_shape: true
  write_per_trace_csv: false


# Optional physics QC visualization after export.
# This writes first-panel-only flattened gather PNGs centered on physical_center_i
# under visualization.out_dir. If no FB file is provided, allow_no_fb creates a
# dummy FB array under work_dir/fb_dummy.
visualization:
  enabled: true
  allow_no_fb: true
  out_dir: /workspace/proc/arakawa/outputs/qc

  max_gathers_per_file: 10
  gather_selection: even
  first_panel_only: true

  first_panel_flatten:
    enabled: true
    reference_key: physical_center_i
    half_samples: 256

  overlays:
    coarse_pmax: true
    trend_center: true
    physical_center: true
    fine_center: false
    window: false
    final_pick: false
    physical_model_status: true
