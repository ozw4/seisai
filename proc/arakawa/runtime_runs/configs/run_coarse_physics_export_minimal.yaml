paths:
  sgy_file: fdata_hset_ARA26_Vib.sgy

visualization:
  enabled: true
  allow_no_fb: true
  max_gathers_per_file: 10
  gather_selection: even
  first_panel_only: true

  first_panel_flatten:
    enabled: true
    reference_key: physical_center_i
    half_samples: 256

  overlays:
    coarse_pmax: true
    trend_center: true
    physical_center: true
    fine_center: false
    window: false
    final_pick: false
    physical_model_status: true

# Optional export defaults. Usually no need to edit.
export:
  grstat_format: recno_channel_range
  values_per_line: 5

# Optional. Set true to rerun only evaluation against a reference grstat.
run:
  eval_only: false
