# Full fitting plus anchor-selection diagnostics. Non-anchor gathers are not reused.
paths:
  sgy_file: fdata_hset_ARA26_Vib.sgy
  sgy_dir: /home/dcuser/data/ActiveSeisField/Arakawa2026
  work_dir: ../../../outputs/runtime_runs/A2_anchor_selection_dry_run
  coarse_dir: ../../../outputs/runtime_runs/A0_full/coarse
  coarse_template: ../../../configs/templates/coarse.yaml
  physics_template: ../../../configs/templates/physics.yaml

run:
  force_coarse: false
  force_physics: true
  force_export: true

physical_runtime:
  diagnostics_enabled: true
  write_runtime_summary: true
  diagnostics:
    enabled: true
    detailed_timing: true
    save_json: true
    save_npz_scalars: true
    save_per_trace_context: false
  fit_policy: full
  anchor_selection:
    enabled: true
    mode: source_xy_stride
    anchor_stride_source_groups: 5
    include_first: true
    include_last: true

visualization:
  enabled: false

export:
  pick_key: physical_center_i
  phase_mode: peak
  max_shift_samples: 2
  grstat_format: recno_channel_range
  values_per_line: 5
