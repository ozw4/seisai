# Fit source-XY anchors every 5 source groups, then reuse the nearest compatible anchor.
paths:
  sgy_file: fdata_hset_ARA26_Vib.sgy
  sgy_dir: /home/dcuser/data/ActiveSeisField/Arakawa2026
  work_dir: ../../../outputs/runtime_runs/A3_anchor_stride5_nearest_anchor
  coarse_dir: ../../../outputs/runtime_runs/A0_full/coarse
  coarse_template: ../../../configs/templates/coarse.yaml
  physics_template: ../../../configs/templates/physics.yaml

run:
  force_coarse: false
  force_physics: true
  force_export: true

physical_runtime:
  diagnostics_enabled: true
  write_runtime_summary: true
  fit_policy: anchor_source_xy
  anchor_selection:
    enabled: true
    mode: source_xy_stride
    anchor_stride_source_groups: 5
    include_first: true
    include_last: true
  anchor_reuse:
    enabled: true
    non_anchor_mode: nearest_anchor
    fallback_if_no_compatible_segment: full_fit

visualization:
  enabled: false

export:
  pick_key: physical_center_i
  phase_mode: peak
  max_shift_samples: 2
  grstat_format: recno_channel_range
  values_per_line: 5
