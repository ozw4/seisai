
paths:
  input_segy_files:  train_input.txt
  target_segy_files: train_target.txt
  infer_input_segy_files:  val_input.txt
  infer_target_segy_files: val_target.txt
  out_dir: ./_pair_out

dataset:
  max_trials: 2048
  use_header_cache: true
  verbose: true
  primary_keys: [ffid]          # gather抽出の主キー（まずはffid推奨）
  secondary_key_fixed: true

pair:
  residual_learning: true
  input_soft_clip_abs: 2.5

train:
  device: auto                  # auto | cpu | cuda | cuda:N
  batch_size: 16
  epochs: 20
  lr: 3.0e-5
  subset_traces: 128          # 1サンプルで使うtrace本数（H）
  samples_per_epoch: 4028
  seed: 42
  use_amp: true
  max_norm: 1.0
  num_workers: 0                # mmap利用時は必ず0

  loss_scope: all
  losses:
    - kind: l1
      weight: 1.0
      scope: all
      params: {}
    - kind: fx_mag_mse
      weight: 0.1
      scope: all
      params:
        use_log: true
        eps: 1.0e-6
        f_lo: 1
        f_hi: null
transform:
  time_len: 6016              # 学習時のみ時間方向crop/pad（推論は時間cropしない）

infer:
  batch_size: 1
  max_batches: 8
  subset_traces: 128           # tile.tile_h以上にすること
  seed: 43
  num_workers: 0                # 固定推論のため0必須

tile:                           # Pairでは必須
  tile_h: 64                 # trace方向タイルサイズ（<= infer.subset_traces）
  overlap_h: 32
  tiles_per_batch: 16
  amp: true
  use_tqdm: false

vis:
  out_subdir: vis
  n: 5
  cmap: seismic
  vmin: -3
  vmax: 3
  transpose_for_trace_time: true
  per_trace_norm: true
  per_trace_eps: 1.0e-8
  figsize: [13.0, 8.0]
  dpi: 150


model:
  backbone: resnet18
  pretrained: false
  in_chans: 1
  out_chans: 1
  pre_stage_use_bn: true
  pre_stages: 3
  pre_stage_strides:
  - - 1
    - 2
  - - 1
    - 1
  - - 1
    - 2
  pre_stage_channels:
  - 16
  - 32
  - 32
  pre_stage_kernels:
  - 3
  - 3
  - 3
  pre_stage_antialias: true
  pre_stage_aa_taps: 3
  pre_stage_aa_pad_mode: zeros

ckpt:
  save_best_only: true
  metric: infer_loss
  mode: min
